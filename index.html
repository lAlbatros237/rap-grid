<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#090909">
<title>Rap Street Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@400;500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090909;
    --surface: #151515;
    --surface2: #1d1d1d;
    --border: #2c2c2c;
    --text: #f4f1e8;
    --muted: #8d877a;
    --cursor: #ffb000;
    --cursor-glow: rgba(255,176,0,0.35);
    --c0: #7fd36b;
    --c1: #4f88ff;
    --c2: #ff6b57;
    --c3: #ffb000;
    --c4: #9a6bff;
    --c5: #2ec4b6;
    --c6: #ff8f3f;
    --c7: #ff4fa3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: radial-gradient(circle at top, #171717 0%, #090909 55%, #050505 100%);
    position: relative;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,0.02), rgba(255,255,255,0.02)),
      repeating-linear-gradient(
        135deg,
        transparent 0px,
        transparent 18px,
        rgba(255,255,255,0.015) 18px,
        rgba(255,255,255,0.015) 20px
      );
    mix-blend-mode: screen;
    opacity: 0.45;
  }
  .hidden { display: none !important; }

  #splash {
    position: fixed;
    inset: 0;
    background: #090909;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    z-index: 100;
    padding: 28px 22px;
  }
  #splash h1 {
    font-family: 'Anton', sans-serif;
    font-size: clamp(40px, 12vw, 74px);
    letter-spacing: 3px;
    text-align: center;
    line-height: 0.95;
    background: linear-gradient(135deg, #fff2c2 0%, var(--cursor) 45%, #ff6b57 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #splash p {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    max-width: 320px;
    line-height: 1.55;
  }
  .mode-picker {
    width: min(100%, 420px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .mode-card {
    background: linear-gradient(180deg, #232323 0%, #161616 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 14px;
    cursor: pointer;
    transition: transform 0.08s, border-color 0.15s, box-shadow 0.15s;
    text-align: center;
    color: var(--text);
  }
  .mode-card:active { transform: scale(0.98); }
  .mode-card.active {
    border-color: var(--cursor);
    box-shadow: 0 0 0 2px rgba(255,176,0,0.12), 0 0 24px rgba(255,176,0,0.12);
  }
  .mode-card .mode-title {
    font-family: 'Anton', sans-serif;
    font-size: 24px;
    letter-spacing: 1.5px;
  }
  .mode-card .mode-sub {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
    margin-top: 8px;
  }
  .bpm-control {
    display: flex;
    align-items: center;
    gap: 20px;
    background: linear-gradient(180deg, #232323 0%, #161616 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    padding: 16px 28px;
  }
  .bpm-btn {
    background: none;
    border: none;
    color: var(--text);
    font-size: 30px;
    cursor: pointer;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }
  .bpm-btn:active { background: var(--border); }
  #bpm-display {
    font-family: 'Anton', sans-serif;
    font-size: 52px;
    color: var(--cursor);
    min-width: 80px;
    text-align: center;
    line-height: 1;
  }
  .bpm-label {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-top: -6px;
    letter-spacing: 2px;
  }
  #start-btn {
    background: linear-gradient(135deg, var(--cursor) 0%, #ff6b57 100%);
    color: #090909;
    border: none;
    border-radius: 14px;
    padding: 18px 54px;
    font-family: 'Anton', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(255,176,0,0.26);
  }
  #start-btn:active { transform: scale(0.97); }

  #game {
    display: none;
    flex-direction: column;
    height: 100dvh;
  }
  #hud {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .hud-pill {
    background: linear-gradient(180deg, #232323 0%, #181818 100%);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-family: 'Teko', sans-serif;
    font-size: 17px;
    letter-spacing: 0.5px;
    color: var(--text);
    white-space: nowrap;
    line-height: 1;
  }
  .hud-pill span { color: var(--cursor); }
  #hud-main {
    flex: 1;
    text-align: right;
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    color: var(--cursor);
    letter-spacing: 1.2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #view-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
    padding: 10px 10px 0;
  }

  #rimes-view { height: 100%; }
  #grid {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .grid-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 1fr 1fr;
    gap: 6px;
    align-items: center;
  }
  .row-num {
    font-family: 'Teko', sans-serif;
    font-size: 14px;
    color: var(--muted);
    text-align: right;
    padding-right: 2px;
  }
  .cell {
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: linear-gradient(180deg, #1d1d1d 0%, #131313 100%);
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    transition: box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    text-align: center;
    padding: 6px;
  }
  .cell.has-word { color: var(--text); }
  .cell.is-cursor {
    border-color: var(--cursor) !important;
    box-shadow: 0 0 0 2px var(--cursor-glow), 0 0 14px var(--cursor-glow);
    animation: pulse-cursor 0.9s ease-in-out infinite;
  }
  @keyframes pulse-cursor {
    0%, 100% { box-shadow: 0 0 0 2px var(--cursor-glow), 0 0 14px var(--cursor-glow); }
    50% { box-shadow: 0 0 0 4px var(--cursor-glow), 0 0 24px var(--cursor-glow); }
  }

  #declencheurs-view {
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .theme-card {
    border: 1px solid var(--border);
    border-radius: 16px;
    background: linear-gradient(180deg, #242424 0%, #171717 100%);
    padding: 16px 14px 14px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.22);
  }
  .theme-label {
    font-family: 'Teko', sans-serif;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
    letter-spacing: 1.2px;
  }
  .theme-value {
    margin-top: 8px;
    font-family: 'Anton', sans-serif;
    font-size: clamp(28px, 7vw, 42px);
    line-height: 1;
    letter-spacing: 1.4px;
    color: var(--cursor);
    text-transform: uppercase;
    word-break: break-word;
  }
  #trigger-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .trigger-card {
    border: 1.5px solid var(--border);
    border-radius: 14px;
    background: linear-gradient(180deg, #1c1c1c 0%, #121212 100%);
    padding: 14px 14px 14px 16px;
    min-height: 74px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
  }
  .trigger-card.active {
    border-color: var(--cursor);
    box-shadow: 0 0 0 2px rgba(255,176,0,0.12), 0 0 18px rgba(255,176,0,0.16);
    transform: translateY(-1px);
  }
  .trigger-index {
    width: 28px;
    flex-shrink: 0;
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    color: var(--muted);
    text-align: center;
  }
  .trigger-card.active .trigger-index { color: var(--cursor); }
  .trigger-text {
    font-size: 17px;
    line-height: 1.25;
    font-weight: 700;
    color: var(--text);
  }
  .trigger-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  #controls {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    padding: 8px 10px 12px;
    border-top: 1px solid var(--border);
  }
  .ctrl-btn {
    background: linear-gradient(180deg, #232323 0%, #181818 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 800;
    padding: 12px 4px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    line-height: 1;
    text-align: center;
    min-height: 64px;
  }
  .ctrl-btn:active {
    background: var(--border);
    transform: scale(0.97);
  }
  .ctrl-btn .icon {
    font-size: 18px;
    font-family: 'Anton', sans-serif;
  }
  .ctrl-btn.pause-active {
    border-color: var(--cursor);
    color: var(--cursor);
  }
  @media (max-width: 420px) {
    .cell { font-size: 13px; }
    .trigger-text { font-size: 15px; }
    .ctrl-btn { font-size: 10px; }
    .hud-pill { font-size: 15px; padding: 4px 8px; }
    #hud-main { font-size: 18px; }
  }
</style>
</head>
<body>

<div id="splash">
  <h1>RAP<br>STREET GRID</h1>
  <p>Choisis ton mode, règle le BPM, puis lance la session.</p>

  <div class="mode-picker">
    <button class="mode-card active" id="mode-rimes-card" type="button">
      <div class="mode-title">RIMES</div>
      <div class="mode-sub">grille de mots<br>et chutes à poser</div>
    </button>
    <button class="mode-card" id="mode-declencheurs-card" type="button">
      <div class="mode-title">DÉCLENCHEURS</div>
      <div class="mode-sub">thème + 4 amorces<br>à exploiter</div>
    </button>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="bpm-control">
      <button class="bpm-btn" id="bpm-down" type="button">−</button>
      <div>
        <div id="bpm-display">90</div>
        <div class="bpm-label">BPM</div>
      </div>
      <button class="bpm-btn" id="bpm-up" type="button">＋</button>
    </div>
  </div>

  <button id="start-btn" type="button">START</button>
</div>

<div id="game">
  <div id="hud">
    <div class="hud-pill">MODE <span id="hud-mode">RIMES</span></div>
    <div class="hud-pill">BPM <span id="hud-bpm">90</span></div>
    <div class="hud-pill" id="hud-a"><span id="hud-a-value">1</span></div>
    <div class="hud-pill" id="hud-b"><span id="hud-b-value">1</span></div>
    <div id="hud-main">—</div>
  </div>

  <div id="view-wrap">
    <div id="rimes-view">
      <div id="grid"></div>
    </div>

    <div id="declencheurs-view" class="hidden">
      <div class="theme-card">
        <div class="theme-label">THÈME</div>
        <div class="theme-value" id="theme-value">—</div>
      </div>
      <div id="trigger-list"></div>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-pause" type="button">
      <span class="icon">▶</span>
      <span>PLAY</span>
    </button>
    <button class="ctrl-btn" id="btn-bpm-down" type="button">
      <span class="icon">−</span>
      <span>−5 BPM</span>
    </button>
    <button class="ctrl-btn" id="btn-bpm-up" type="button">
      <span class="icon">+</span>
      <span>+5 BPM</span>
    </button>
    <button class="ctrl-btn" id="btn-reset" type="button">
      <span class="icon">↺</span>
      <span>RESET</span>
    </button>
    <button class="ctrl-btn" id="btn-home" type="button">
      <span class="icon">⌂</span>
      <span>ACCUEIL</span>
    </button>
  </div>
</div>

<script>
const RHYME_GROUPS = [
  // 1 syllabe, très minoritaires
  {syllables:1,key:"oi",words:["moi","toi","voix","fois","choix","loi"]},
  {syllables:1,key:"ui",words:["nuit","bruit","fruit","pluie","lui","puits"]},
  {syllables:1,key:"an",words:["temps","sang","vent","camp","champ","rang"]},
  {syllables:1,key:"on",words:["nom","son","don","fond","rond","ton"]},
  {syllables:1,key:"eur1",words:["cœur","peur","sœur","heure","fleur","leur"]},

  // 2 syllabes, cœur du jeu
  {syllables:2,key:"age",words:["image","visage","message","passage","voyage","nuage","village","courage"]},
  {syllables:2,key:"aison",words:["maison","raison","saison","poison","cloison","liaison","trahison","oraison"]},
  {syllables:2,key:"ance",words:["chance","avance","danse","enfance","distance","naissance","errance","confiance"]},
  {syllables:2,key:"ence",words:["présence","absence","essence","patience","science","silence","violence","influence"]},
  {syllables:2,key:"eau",words:["cadeau","rideau","niveau","réseau","bateau","gâteau","château","berceau"]},
  {syllables:2,key:"our",words:["amour","retour","détour","séjour","secours","discours","parcours","velours"]},
  {syllables:2,key:"eur2",words:["chaleur","douleur","couleur","lueur","saveur","valeur","bonheur","humeur"]},
  {syllables:2,key:"esse",words:["jeunesse","tristesse","richesse","sagesse","faiblesse","promesse","tendresse","largesse"]},
  {syllables:2,key:"oire",words:["histoire","victoire","mémoire","grimoire","déboire","notoire","espoir","bonsoir"]},
  {syllables:2,key:"ique",words:["musique","logique","magique","pratique","physique","technique","classique","toxique"]},
  {syllables:2,key:"able2",words:["capable","coupable","durable","valable","notable","stable","aimable","portable"]},
  {syllables:2,key:"une",words:["fortune","lacune","rancune","tribune","commune","chacune"]},
  {syllables:2,key:"ine",words:["routine","cuisine","usine","machine","piscine","vitrine","colline","cousine"]},
  {syllables:2,key:"ime",words:["rime","crime","victime","estime","abîme","régime","maxime","intime"]},
  {syllables:2,key:"ace",words:["menace","audace","grimace","palace","tenace","rapace","surface","trace"]},
  {syllables:2,key:"aire",words:["salaire","solaire","notaire","libraire","repaire","calvaire","affaire","primaire"]},
  {syllables:2,key:"iere",words:["lumière","poussière","prière","manière","derrière","barrière","matière","carrière"]},
  {syllables:2,key:"elle",words:["rebelle","querelle","ficelle","ruelle","nacelle","semelle","belle","nouvelle"]},
  {syllables:2,key:"ete",words:["tempête","défaite","requête","comète","secrète","discrète","fête","quête"]},
  {syllables:2,key:"ard",words:["regard","hasard","départ","retard","placard","brouillard","canard","pétard"]},
  {syllables:2,key:"oir",words:["devoir","vouloir","savoir","revoir","miroir","couloir","trottoir","pouvoir"]},
  {syllables:2,key:"ir",words:["finir","partir","dormir","sentir","choisir","grandir","sortir","mentir"]},
  {syllables:2,key:"er",words:["parler","laisser","penser","changer","marcher","tomber","donner","rêver"]},
  {syllables:2,key:"ole",words:["parole","boussole","console","symbole","corolle","auréole"]},
  {syllables:2,key:"ite2",words:["cité","pitié","moitié","fierté","clarté","santé","bonté","beauté"]},
  {syllables:2,key:"ant",words:["enfant","moment","vivant","présent","absent","courant","constant","distant"]},
  {syllables:2,key:"ain",words:["matin","chemin","destin","copain","demain","humain","terrain","refrain"]},
  {syllables:2,key:"al",words:["signal","final","banal","normal","journal","local","global","brutal"]},
  {syllables:2,key:"ou",words:["bijou","caillou","genou","debout","partout","surtout","bout","coup"]},
  {syllables:2,key:"as",words:["combat","débat","repas","fracas","tracas","éclat"]},
  {syllables:2,key:"ote",words:["pilote","pote","note","faute","côte","vote","capote","anecdote"]},
  {syllables:2,key:"ame",words:["flamme","âme","drame","femme","dame","lame","rame","blâme"]},
  {syllables:2,key:"ise",words:["surprise","maîtrise","valise","crise","église","bêtise","brise","emprise"]},
  {syllables:2,key:"onde",words:["monde","seconde","ronde","onde","profonde","fronde"]},
  {syllables:2,key:"ombre",words:["ombre","sombre","nombre","membre","chambre","décembre"]},
  {syllables:2,key:"agne",words:["montagne","campagne","compagne","Espagne","bagne","gagne"]},
  {syllables:2,key:"ange",words:["mélange","échange","étrange","ange","orange","louange","frange","range"]},
  {syllables:2,key:"ite",words:["limite","visite","élite","réussite","conduite","suite"]},
  {syllables:2,key:"ouche",words:["bouche","couche","touche","douche","mouche","cartouche","souche","peluche"]},
  {syllables:2,key:"aille",words:["bataille","médaille","faille","taille","travaille","muraille","canaille","détaille"]},
  {syllables:2,key:"arme",words:["larme","arme","charme","alarme","désarme","vacarme"]},
  {syllables:2,key:"oute",words:["route","doute","écoute","goutte","voûte","déroute"]},
  {syllables:2,key:"eille",words:["oreille","veille","merveille","bouteille","abeille","réveil"]},
  {syllables:2,key:"eil",words:["soleil","conseil","sommeil","pareil","réveil","vermeil"]},
  {syllables:2,key:"igne",words:["ligne","signe","digne","consigne","désigne","vigne"]},
  {syllables:2,key:"aine",words:["semaine","peine","haine","chaîne","reine","fontaine"]},
  {syllables:2,key:"oche",words:["proche","poche","roche","cloche","accroche","approche","reproche","coche"]},
  {syllables:2,key:"ogue",words:["dialogue","prologue","monologue","catalogue","analogue","pédagogue"]},
  {syllables:2,key:"anche",words:["dimanche","manche","branche","planche","franche","tranche"]},
  {syllables:2,key:"ure",words:["mesure","figure","nature","voiture","lecture","écriture","blessure","fissure"]},
  {syllables:2,key:"ille",words:["ville","fille","brille","famille","bille","grille","quille","tranquille"]},
  {syllables:2,key:"ie",words:["vie","envie","partie","sortie","amie","folie","pluie","magie"]},
  {syllables:2,key:"ue",words:["rue","battue","venue","tenue","connue","inconnue","avenue","issue"]},
  {syllables:2,key:"ume",words:["plume","volume","coutume","allume","parfume","amertume","costume","légume"]},
  {syllables:2,key:"dre",words:["prendre","attendre","défendre","vendre","tendre","fendre","descendre","entendre"]},
  {syllables:2,key:"ee",words:["idée","journée","année","matinée","soirée","destinée","équipée","dictée"]},
  {syllables:2,key:"eux",words:["deux","feux","lieux","milieux","jeux","vœux","heureux","peureux"]},
  {syllables:2,key:"asse",words:["classe","masse","tasse","glace","place","face","trace","passe"]},
  {syllables:2,key:"ose",words:["chose","pose","repose","cause","pause","rose","close"]},
  {syllables:2,key:"ouve",words:["trouve","prouve","éprouve","retrouve","approuve"]},
  {syllables:2,key:"ire",words:["dire","rire","sourire","délire","empire","aspire","désire","martyre"]},
  {syllables:2,key:"iste",words:["artiste","triste","liste","piste","modiste","égoïste"]},

  // 3 syllabes, secondaires
  {syllables:3,key:"venir",words:["avenir","souvenir","devenir","revenir","parvenir","prévenir","intervenir"]},

function beatInterval() { return 60000 / state.bpm; }
function sampleOne(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function ensureAudio() {
  if (!state.audio.ctx) {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    state.audio.ctx = new AudioCtx();
    state.audio.master = state.audio.ctx.createGain();
    state.audio.master.gain.value = 0.82;
    state.audio.master.connect(state.audio.ctx.destination);

    const buffer = state.audio.ctx.createBuffer(1, Math.floor(state.audio.ctx.sampleRate * 0.25), state.audio.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    state.audio.noiseBuffer = buffer;
  }
  return state.audio.ctx;
}

async function resumeAudioIfNeeded() {
  const ctx = ensureAudio();
  if (ctx.state === "suspended") {
    await ctx.resume();
  }
  return ctx;
}

function stopAudioScheduler() {
  if (state.audio.schedulerId) {
    clearInterval(state.audio.schedulerId);
    state.audio.schedulerId = null;
  }
}

function kick(at) {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(150, at);
  osc.frequency.exponentialRampToValueAtTime(48, at + 0.12);

  gain.gain.setValueAtTime(0.0001, at);
  gain.gain.exponentialRampToValueAtTime(1.0, at + 0.002);
  gain.gain.exponentialRampToValueAtTime(0.0001, at + 0.18);

  osc.connect(gain);
  gain.connect(state.audio.master);

  osc.start(at);
  osc.stop(at + 0.2);
}

function snare(at) {
  const ctx = ensureAudio();

  const noise = ctx.createBufferSource();
  noise.buffer = state.audio.noiseBuffer;

  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = "highpass";
  noiseFilter.frequency.setValueAtTime(1400, at);

  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0.0001, at);
  noiseGain.gain.exponentialRampToValueAtTime(0.75, at + 0.001);
  noiseGain.gain.exponentialRampToValueAtTime(0.0001, at + 0.12);

  const body = ctx.createOscillator();
  body.type = "triangle";
  body.frequency.setValueAtTime(180, at);

  const bodyGain = ctx.createGain();
  bodyGain.gain.setValueAtTime(0.0001, at);
  bodyGain.gain.exponentialRampToValueAtTime(0.35, at + 0.001);
  bodyGain.gain.exponentialRampToValueAtTime(0.0001, at + 0.08);

  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(state.audio.master);

  body.connect(bodyGain);
  bodyGain.connect(state.audio.master);

  noise.start(at);
  noise.stop(at + 0.14);
  body.start(at);
  body.stop(at + 0.09);
}

function hat(at) {
  const ctx = ensureAudio();

  const noise = ctx.createBufferSource();
  noise.buffer = state.audio.noiseBuffer;

  const filter = ctx.createBiquadFilter();
  filter.type = "highpass";
  filter.frequency.setValueAtTime(6500, at);

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.0001, at);
  gain.gain.exponentialRampToValueAtTime(0.18, at + 0.001);
  gain.gain.exponentialRampToValueAtTime(0.0001, at + 0.045);

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(state.audio.master);

  noise.start(at);
  noise.stop(at + 0.05);
}


function bigBoom(at) {
  const ctx = ensureAudio();

  // Grave principal
  const sub = ctx.createOscillator();
  const subGain = ctx.createGain();
  sub.type = "sine";
  sub.frequency.setValueAtTime(95, at);
  sub.frequency.exponentialRampToValueAtTime(38, at + 0.28);

  subGain.gain.setValueAtTime(0.0001, at);
  subGain.gain.exponentialRampToValueAtTime(1.4, at + 0.002);
  subGain.gain.exponentialRampToValueAtTime(0.0001, at + 0.42);

  sub.connect(subGain);
  subGain.connect(state.audio.master);

  // Attaque un peu sale
  const click = ctx.createBufferSource();
  click.buffer = state.audio.noiseBuffer;

  const clickFilter = ctx.createBiquadFilter();
  clickFilter.type = "lowpass";
  clickFilter.frequency.setValueAtTime(900, at);

  const clickGain = ctx.createGain();
  clickGain.gain.setValueAtTime(0.0001, at);
  clickGain.gain.exponentialRampToValueAtTime(0.28, at + 0.001);
  clickGain.gain.exponentialRampToValueAtTime(0.0001, at + 0.06);

  click.connect(clickFilter);
  clickFilter.connect(clickGain);
  clickGain.connect(state.audio.master);

  sub.start(at);
  sub.stop(at + 0.45);
  click.start(at);
  click.stop(at + 0.07);
}

function scheduleOneBar(barStartTime, bpm) {
  const beat = 60 / bpm;

  kick(barStartTime + 0 * beat);
  kick(barStartTime + 2 * beat);
  kick(barStartTime + 2.5 * beat);

  snare(barStartTime + 1 * beat);
  snare(barStartTime + 3 * beat);

  hat(barStartTime + 0.5 * beat);
  hat(barStartTime + 1.5 * beat);
  hat(barStartTime + 2.5 * beat);
  hat(barStartTime + 3.5 * beat);

  // énorme BOUM juste avant la mesure suivante
  bigBoom(barStartTime + 4 * beat - 0.035);
}

function audioSchedulerTick() {
  if (!state.running) return;
  const ctx = state.audio.ctx;
  if (!ctx) return;

  const lookAhead = 0.12;
  while (state.audio.nextBarTime < ctx.currentTime + lookAhead) {
    scheduleOneBar(state.audio.nextBarTime, state.bpm);
    state.audio.nextBarTime += 4 * (60 / state.bpm);
  }
}

async function startAudioScheduler() {
  const ctx = await resumeAudioIfNeeded();
  stopAudioScheduler();
  state.audio.nextBarTime = ctx.currentTime + 0.05;
  audioSchedulerTick();
  state.audio.schedulerId = setInterval(audioSchedulerTick, 25);
}
function setMode(mode) {
  state.selectedMode = mode;
  document.getElementById("mode-rimes-card").classList.toggle("active", mode === "rimes");
  document.getElementById("mode-declencheurs-card").classList.toggle("active", mode === "declencheurs");
}
function refillBag(g) { state.rimes.groupBags[g].push(...shuffle(RHYME_GROUPS[g].words)); }
function pickDistinctWords(g, n) {
  const chosen = [], seen = new Set();
  while (chosen.length < n) {
    if (!state.rimes.groupBags[g].length) refillBag(g);
    const w = state.rimes.groupBags[g].pop();
    if (seen.has(w)) continue;
    chosen.push(w);
    seen.add(w);
  }
  return chosen;
}
function chooseRhymeGroup() {
  const recent = new Set(state.rimes.recentGroups.slice(-12));
  let candidates = RHYME_GROUPS.map((_, i) => i).filter(i => !recent.has(i));
  if (!candidates.length) candidates = RHYME_GROUPS.map((_, i) => i);
  const weights = candidates.map(i => {
    const base = 1 / (1 + state.rimes.groupUsage[i]);
    if (RHYME_GROUPS[i].syllables === 2) return base * 1.8;
    if (RHYME_GROUPS[i].syllables === 1) return base * 0.45;
    return base * 0.9;
  });
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let k = 0; k < candidates.length; k++) {
    r -= weights[k];
    if (r <= 0) {
      const g = candidates[k];
      state.rimes.groupUsage[g]++;
      state.rimes.recentGroups.push(g);
      return g;
    }
  }
  return candidates[candidates.length - 1];
}
function helperWord(g, forbidden, rowIdx) {
  const forbiddenSet = new Set([forbidden]);
  if (rowIdx > 0) {
    forbiddenSet.add(state.rimes.rows[rowIdx - 1].word4);
    if (state.rimes.rows[rowIdx - 1].word2) forbiddenSet.add(state.rimes.rows[rowIdx - 1].word2);
  }
  let available = RHYME_GROUPS[g].words.filter(w => !forbiddenSet.has(w));
  if (!available.length) available = RHYME_GROUPS[g].words.filter(w => w !== forbidden);
  if (!available.length) return null;
  return sampleOne(available);
}
function generateRhymeBlock() {
  const blockLen = Math.random() < 0.30 ? 4 : 2;
  const g = chooseRhymeGroup();
  const color = PALETTE[g % PALETTE.length];
  const words4 = pickDistinctWords(g, blockLen);
  for (const w4 of words4) {
    const rowIdx = state.rimes.rows.length;
    const w2 = Math.random() < 0.25 ? helperWord(g, w4, rowIdx) : null;
    state.rimes.rows.push({ word2: w2, word4: w4, group: g, color, key: RHYME_GROUPS[g].key });
  }
}
function ensureRhymeRows(n) { while (state.rimes.rows.length < n) generateRhymeBlock(); }
function initRimes() {
  state.rimes.rows = [];
  state.rimes.rowIdx = 0;
  state.rimes.colIdx = 0;
  state.rimes.groupBags = RHYME_GROUPS.map(() => []);
  state.rimes.groupUsage = RHYME_GROUPS.map(() => 0);
  state.rimes.recentGroups = [];
  ensureRhymeRows(24);
}
function advanceRimes() {
  state.rimes.colIdx++;
  if (state.rimes.colIdx >= COLS) {
    state.rimes.colIdx = 0;
    state.rimes.rowIdx++;
    ensureRhymeRows(state.rimes.rowIdx + 24);
  }
}
function pickTheme() {
  const recent = state.declencheurs.recentThemes.slice(-10);
  let pool = THEMES.filter(t => !recent.includes(t));
  if (!pool.length) pool = [...THEMES];
  return sampleOne(pool);
}
function pickTriggers(n = 4) {
  const recent = state.declencheurs.recentTriggers.slice(-12);
  let pool = TRIGGERS.filter(t => !recent.includes(t));
  if (pool.length < n) pool = [...TRIGGERS];
  return shuffle(pool).slice(0, n);
}
function initDeclencheursPack() {
  const theme = pickTheme();
  const triggers = pickTriggers(4);
  state.declencheurs.theme = theme;
  state.declencheurs.triggers = triggers;
  state.declencheurs.cycleBeat = 0;
  state.declencheurs.recentThemes.push(theme);
  state.declencheurs.recentTriggers.push(...triggers);
}
function initDeclencheurs() {
  state.declencheurs.recentThemes = [];
  state.declencheurs.recentTriggers = [];
  initDeclencheursPack();
}
function advanceDeclencheurs() {
  state.declencheurs.cycleBeat++;
  if (state.declencheurs.cycleBeat >= TRIGGER_BLOCK_BEATS) {
    initDeclencheursPack();
  }
}
function activeTriggerIndex() { return Math.min(3, Math.floor(state.declencheurs.cycleBeat / 8)); }
function currentMeasureInBlock() { return Math.floor(state.declencheurs.cycleBeat / 4) + 1; }
function currentBeatInMeasure() {
  return state.selectedMode === "rimes" ? state.rimes.colIdx + 1 : (state.declencheurs.cycleBeat % 4) + 1;
}
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}
function buildRhymeRows() {
  const gridEl = document.getElementById("grid");
  gridEl.innerHTML = "";
  const startRow = Math.max(0, state.rimes.rowIdx - 2);
  const endRow = startRow + VISIBLE_ROWS;
  ensureRhymeRows(endRow + 4);
  for (let vr = 0; vr < VISIBLE_ROWS; vr++) {
    const realR = startRow + vr;
    if (realR >= state.rimes.rows.length) break;
    const row = state.rimes.rows[realR];
    const rowDiv = document.createElement("div");
    rowDiv.className = "grid-row";
    const numEl = document.createElement("div");
    numEl.className = "row-num";
    numEl.textContent = realR + 1;
    rowDiv.appendChild(numEl);
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      if (c === 1 && row.word2) {
        cell.classList.add("has-word");
        cell.textContent = row.word2;
        cell.style.background = hexToRgba(row.color, 0.22);
        cell.style.borderColor = hexToRgba(row.color, 0.55);
      } else if (c === 3) {
        cell.classList.add("has-word");
        cell.textContent = row.word4;
        cell.style.background = hexToRgba(row.color, 0.45);
        cell.style.borderColor = row.color;
      }
      if (realR === state.rimes.rowIdx && c === state.rimes.colIdx) {
        cell.classList.add("is-cursor");
      }
      rowDiv.appendChild(cell);
    }
    gridEl.appendChild(rowDiv);
  }
}
function buildTriggerCards() {
  const list = document.getElementById("trigger-list");
  list.innerHTML = "";
  const activeIdx = activeTriggerIndex();
  state.declencheurs.triggers.forEach((txt, i) => {
    const card = document.createElement("div");
    card.className = "trigger-card";
    if (i === activeIdx) card.classList.add("active");
    const idx = document.createElement("div");
    idx.className = "trigger-index";
    idx.textContent = i + 1;
    const wrap = document.createElement("div");
    wrap.style.flex = "1";
    const text = document.createElement("div");
    text.className = "trigger-text";
    text.textContent = txt;
    const hint = document.createElement("div");
    hint.className = "trigger-hint";
    hint.textContent = i === activeIdx ? "déclencheur actif" : "à exploiter ensuite";
    wrap.appendChild(text);
    wrap.appendChild(hint);
    card.appendChild(idx);
    card.appendChild(wrap);
    list.appendChild(card);
  });
  document.getElementById("theme-value").textContent = state.declencheurs.theme || "—";
}
function updateHUD() {
  document.getElementById("hud-mode").textContent = state.selectedMode === "rimes" ? "RIMES" : "DÉCL.";
  document.getElementById("hud-bpm").textContent = state.bpm;
  if (state.selectedMode === "rimes") {
    const cur = state.rimes.rows[state.rimes.rowIdx];
    document.getElementById("hud-a").innerHTML = 'L.<span id="hud-a-value">' + (state.rimes.rowIdx + 1) + '</span>';
    document.getElementById("hud-b").innerHTML = '<span id="hud-b-value">' + (state.rimes.colIdx + 1) + '</span>/4';
    document.getElementById("hud-main").textContent = cur ? cur.word4 : "—";
  } else {
    document.getElementById("hud-a").innerHTML = 'MES.<span id="hud-a-value">' + currentMeasureInBlock() + '</span>/8';
    document.getElementById("hud-b").innerHTML = '<span id="hud-b-value">' + currentBeatInMeasure() + '</span>/4';
    document.getElementById("hud-main").textContent = state.declencheurs.theme || "—";
  }
}
function render() {
  document.getElementById("rimes-view").classList.toggle("hidden", state.selectedMode !== "rimes");
  document.getElementById("declencheurs-view").classList.toggle("hidden", state.selectedMode !== "declencheurs");
  if (state.selectedMode === "rimes") buildRhymeRows();
  else buildTriggerCards();
  updateHUD();
}
function setPlayButton(isRunning) {
  const pauseBtn = document.getElementById("btn-pause");
  pauseBtn.querySelector(".icon").textContent = isRunning ? "⏸" : "▶";
  pauseBtn.querySelector("span:last-child").textContent = isRunning ? "PAUSE" : "PLAY";
  pauseBtn.classList.toggle("pause-active", !isRunning);
}
function startSelectedMode() {
  state.activeScreen = "game";
  state.running = false;
  stopAudioScheduler();
  state.lastBeatTime = performance.now();
  if (state.selectedMode === "rimes") initRimes();
  else initDeclencheurs();
  document.getElementById("splash").style.display = "none";
  document.getElementById("game").style.display = "flex";
  setPlayButton(false);
  render();
  if (!state.animFrameId) state.animFrameId = requestAnimationFrame(loop);
}
function goHome() {
  state.activeScreen = "splash";
  state.running = false;
  stopAudioScheduler();
  document.getElementById("game").style.display = "none";
  document.getElementById("splash").style.display = "flex";
  setPlayButton(false);
}
async function togglePause() {
  if (state.activeScreen !== "game") return;
  state.running = !state.running;
  if (state.running) {
    state.lastBeatTime = performance.now();
    await startAudioScheduler();
  } else {
    stopAudioScheduler();
  }
  setPlayButton(state.running);
}
function changeBpm(delta) {
  state.bpm = Math.max(30, Math.min(240, state.bpm + delta));
  document.getElementById("bpm-display").textContent = state.bpm;
  updateHUD();
}
function resetCurrentMode() {
  if (state.selectedMode === "rimes") initRimes();
  else initDeclencheurs();
  state.running = false;
  stopAudioScheduler();
  state.lastBeatTime = performance.now();
  setPlayButton(false);
  render();
}
function loop(now) {
  if (state.activeScreen === "game" && state.running) {
    const bi = beatInterval();
    if (now - state.lastBeatTime >= bi) {
      state.lastBeatTime += bi;
      if (state.lastBeatTime < now - bi * 2) state.lastBeatTime = now;
      if (state.selectedMode === "rimes") advanceRimes();
      else advanceDeclencheurs();
    }
  }
  if (state.activeScreen === "game") render();
  state.animFrameId = requestAnimationFrame(loop);
}
document.getElementById("mode-rimes-card").addEventListener("click", () => setMode("rimes"));
document.getElementById("mode-declencheurs-card").addEventListener("click", () => setMode("declencheurs"));
document.getElementById("bpm-up").addEventListener("click", () => changeBpm(+5));
document.getElementById("bpm-down").addEventListener("click", () => changeBpm(-5));
document.getElementById("start-btn").addEventListener("click", startSelectedMode);
document.getElementById("btn-pause").addEventListener("click", togglePause);
document.getElementById("btn-bpm-down").addEventListener("click", () => changeBpm(-5));
document.getElementById("btn-bpm-up").addEventListener("click", () => changeBpm(+5));
document.getElementById("btn-reset").addEventListener("click", resetCurrentMode);
document.getElementById("btn-home").addEventListener("click", goHome);
document.addEventListener("keydown", (e) => {
  if (state.activeScreen !== "game") return;
  if (e.key === " ") { e.preventDefault(); togglePause(); }
  if (e.key === "ArrowUp") changeBpm(+5);
  if (e.key === "ArrowDown") changeBpm(-5);
  if (e.key === "r" || e.key === "R") resetCurrentMode();
  if (e.key === "Escape") goHome();
});
document.getElementById("bpm-display").textContent = state.bpm;
setMode("rimes");
setPlayButton(false);
</script>
</body>
