<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#090909">
<title>Rap Street Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@400;500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090909;
    --surface: #151515;
    --surface2: #1d1d1d;
    --border: #2c2c2c;
    --text: #f4f1e8;
    --muted: #8d877a;
    --cursor: #ffb000;
    --cursor-glow: rgba(255,176,0,0.35);
    --c0: #7fd36b;
    --c1: #4f88ff;
    --c2: #ff6b57;
    --c3: #ffb000;
    --c4: #9a6bff;
    --c5: #2ec4b6;
    --c6: #ff8f3f;
    --c7: #ff4fa3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: radial-gradient(circle at top, #171717 0%, #090909 55%, #050505 100%);
    position: relative;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,0.02), rgba(255,255,255,0.02)),
      repeating-linear-gradient(
        135deg,
        transparent 0px,
        transparent 18px,
        rgba(255,255,255,0.015) 18px,
        rgba(255,255,255,0.015) 20px
      );
    mix-blend-mode: screen;
    opacity: 0.45;
  }
  .hidden { display: none !important; }

  #splash {
    position: fixed;
    inset: 0;
    background: #090909;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    z-index: 100;
    padding: 28px 22px;
  }
  #splash h1 {
    font-family: 'Anton', sans-serif;
    font-size: clamp(40px, 12vw, 74px);
    letter-spacing: 3px;
    text-align: center;
    line-height: 0.95;
    background: linear-gradient(135deg, #fff2c2 0%, var(--cursor) 45%, #ff6b57 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #splash p {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    max-width: 320px;
    line-height: 1.55;
  }
  .mode-picker {
    width: min(100%, 420px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .mode-card {
    background: linear-gradient(180deg, #232323 0%, #161616 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 14px;
    cursor: pointer;
    transition: transform 0.08s, border-color 0.15s, box-shadow 0.15s;
    text-align: center;
    color: var(--text);
  }
  .mode-card:active { transform: scale(0.98); }
  .mode-card.active {
    border-color: var(--cursor);
    box-shadow: 0 0 0 2px rgba(255,176,0,0.12), 0 0 24px rgba(255,176,0,0.12);
  }
  .mode-card .mode-title {
    font-family: 'Anton', sans-serif;
    font-size: 24px;
    letter-spacing: 1.5px;
  }
  .mode-card .mode-sub {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
    margin-top: 8px;
  }
  .bpm-control {
    display: flex;
    align-items: center;
    gap: 20px;
    background: linear-gradient(180deg, #232323 0%, #161616 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    padding: 16px 28px;
  }
  .bpm-btn {
    background: none;
    border: none;
    color: var(--text);
    font-size: 30px;
    cursor: pointer;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }
  .bpm-btn:active { background: var(--border); }
  #bpm-display {
    font-family: 'Anton', sans-serif;
    font-size: 52px;
    color: var(--cursor);
    min-width: 80px;
    text-align: center;
    line-height: 1;
  }
  .bpm-label {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-top: -6px;
    letter-spacing: 2px;
  }
  #start-btn {
    background: linear-gradient(135deg, var(--cursor) 0%, #ff6b57 100%);
    color: #090909;
    border: none;
    border-radius: 14px;
    padding: 18px 54px;
    font-family: 'Anton', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(255,176,0,0.26);
  }
  #start-btn:active { transform: scale(0.97); }

  #game {
    display: none;
    flex-direction: column;
    height: 100dvh;
  }
  #hud {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .hud-pill {
    background: linear-gradient(180deg, #232323 0%, #181818 100%);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-family: 'Teko', sans-serif;
    font-size: 17px;
    letter-spacing: 0.5px;
    color: var(--text);
    white-space: nowrap;
    line-height: 1;
  }
  .hud-pill span { color: var(--cursor); }
  #hud-main {
    flex: 1;
    text-align: right;
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    color: var(--cursor);
    letter-spacing: 1.2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #view-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
    padding: 10px 10px 0;
  }

  #grid {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .grid-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 1fr 1fr;
    gap: 6px;
    align-items: center;
  }
  .row-num {
    font-family: 'Teko', sans-serif;
    font-size: 14px;
    color: var(--muted);
    text-align: right;
    padding-right: 2px;
  }
  .cell {
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: linear-gradient(180deg, #1d1d1d 0%, #131313 100%);
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    transition: box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    text-align: center;
    padding: 6px;
  }
  .cell.has-word { color: var(--text); }
  .cell.is-cursor {
    border-color: var(--cursor) !important;
    box-shadow: 0 0 0 2px var(--cursor-glow), 0 0 14px var(--cursor-glow);
    animation: pulse-cursor 0.9s ease-in-out infinite;
  }
  @keyframes pulse-cursor {
    0%, 100% { box-shadow: 0 0 0 2px var(--cursor-glow), 0 0 14px var(--cursor-glow); }
    50% { box-shadow: 0 0 0 4px var(--cursor-glow), 0 0 24px var(--cursor-glow); }
  }

  #declencheurs-view {
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .theme-card {
    border: 1px solid var(--border);
    border-radius: 16px;
    background: linear-gradient(180deg, #242424 0%, #171717 100%);
    padding: 16px 14px 14px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.22);
  }
  .theme-label {
    font-family: 'Teko', sans-serif;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
    letter-spacing: 1.2px;
  }
  .theme-value {
    margin-top: 8px;
    font-family: 'Anton', sans-serif;
    font-size: clamp(28px, 7vw, 42px);
    line-height: 1;
    letter-spacing: 1.4px;
    color: var(--cursor);
    text-transform: uppercase;
    word-break: break-word;
  }
  #trigger-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .trigger-card {
    border: 1.5px solid var(--border);
    border-radius: 14px;
    background: linear-gradient(180deg, #1c1c1c 0%, #121212 100%);
    padding: 14px 14px 14px 16px;
    min-height: 74px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
  }
  .trigger-card.active {
    border-color: var(--cursor);
    box-shadow: 0 0 0 2px rgba(255,176,0,0.12), 0 0 18px rgba(255,176,0,0.16);
    transform: translateY(-1px);
  }
  .trigger-index {
    width: 28px;
    flex-shrink: 0;
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    color: var(--muted);
    text-align: center;
  }
  .trigger-card.active .trigger-index { color: var(--cursor); }
  .trigger-text {
    font-size: 17px;
    line-height: 1.25;
    font-weight: 700;
    color: var(--text);
  }
  .trigger-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  #controls {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    padding: 8px 10px 12px;
    border-top: 1px solid var(--border);
  }
  .ctrl-btn {
    background: linear-gradient(180deg, #232323 0%, #181818 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 800;
    padding: 12px 4px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    line-height: 1;
    text-align: center;
    min-height: 64px;
  }
  .ctrl-btn:active {
    background: var(--border);
    transform: scale(0.97);
  }
  .ctrl-btn .icon {
    font-size: 18px;
    font-family: 'Anton', sans-serif;
  }
  .ctrl-btn.pause-active {
    border-color: var(--cursor);
    color: var(--cursor);
  }
  @media (max-width: 420px) {
    .cell { font-size: 13px; }
    .trigger-text { font-size: 15px; }
    .ctrl-btn { font-size: 10px; }
    .hud-pill { font-size: 15px; padding: 4px 8px; }
    #hud-main { font-size: 18px; }
  }
</style>
</head>
<body>

<div id="splash">
  <h1>RAP<br>STREET GRID</h1>
  <p>Choisis ton mode, règle le BPM, puis lance la session.</p>

  <div class="mode-picker">
    <button class="mode-card active" id="mode-rimes-card" type="button">
      <div class="mode-title">RIMES</div>
      <div class="mode-sub">grille de mots<br>et chutes à poser</div>
    </button>
    <button class="mode-card" id="mode-declencheurs-card" type="button">
      <div class="mode-title">DÉCLENCHEURS</div>
      <div class="mode-sub">thème + 4 amorces<br>à exploiter</div>
    </button>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="bpm-control">
      <button class="bpm-btn" id="bpm-down" type="button">−</button>
      <div>
        <div id="bpm-display">90</div>
        <div class="bpm-label">BPM</div>
      </div>
      <button class="bpm-btn" id="bpm-up" type="button">＋</button>
    </div>
  </div>

  <button id="start-btn" type="button">START</button>
</div>

<div id="game">
  <div id="hud">
    <div class="hud-pill">MODE <span id="hud-mode">RIMES</span></div>
    <div class="hud-pill">BPM <span id="hud-bpm">90</span></div>
    <div class="hud-pill" id="hud-a"><span id="hud-a-value">1</span></div>
    <div class="hud-pill" id="hud-b"><span id="hud-b-value">1</span></div>
    <div id="hud-main">—</div>
  </div>

  <div id="view-wrap">
    <div id="rimes-view">
      <div id="grid"></div>
    </div>

    <div id="declencheurs-view" class="hidden">
      <div class="theme-card">
        <div class="theme-label">THÈME</div>
        <div class="theme-value" id="theme-value">—</div>
      </div>
      <div id="trigger-list"></div>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-pause" type="button">
      <span class="icon">▶</span>
      <span>PLAY</span>
    </button>
    <button class="ctrl-btn" id="btn-bpm-down" type="button">
      <span class="icon">−</span>
      <span>−5 BPM</span>
    </button>
    <button class="ctrl-btn" id="btn-bpm-up" type="button">
      <span class="icon">+</span>
      <span>+5 BPM</span>
    </button>
    <button class="ctrl-btn" id="btn-reset" type="button">
      <span class="icon">↺</span>
      <span>RESET</span>
    </button>
    <button class="ctrl-btn" id="btn-home" type="button">
      <span class="icon">⌂</span>
      <span>ACCUEIL</span>
    </button>
  </div>
</div>

<script>
// ====================== DONNÉES ======================
const RHYME_GROUPS = [ /* ... ton tableau original inchangé ... */ ];
const THEMES = [ /* ... ton tableau original inchangé ... */ ];
const TRIGGERS = [ /* ... ton tableau original inchangé ... */ ];

const PALETTE = ["#3dba6e","#4a85d4","#e06060","#c8962a","#9060c8","#2ab8b8","#d47840","#b84090"];
const COLS = 4;
const VISIBLE_ROWS = 7;
const TRIGGER_BLOCK_BEATS = 32;

// ====================== STATE ======================
const state = {
  bpm: 90,
  selectedMode: "rimes",
  activeScreen: "splash",
  running: false,
  lastBeatTime: 0,
  lastSubBeatTime: 0,
  animFrameId: null,

  rimes: { rows: [], rowIdx: 0, colIdx: 0, groupBags: [], groupUsage: [], recentGroups: [] },
  declencheurs: { theme: "", triggers: [], cycleBeat: 0, recentThemes: [], recentTriggers: [] }
};

// ====================== AUDIO ======================
let audioCtx = null;
let drumStep = 0;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function playKick(time = null) {
  ensureAudio();
  const t = time ?? audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(45, t + 0.12);
  gain.gain.setValueAtTime(1.0, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.13);
}

function playSnare(time = null) {
  ensureAudio();
  const t = time ?? audioCtx.currentTime;
  const bufferSize = Math.floor(audioCtx.sampleRate * 0.18);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = "highpass";
  filter.frequency.setValueAtTime(1800, t);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.65, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.10);

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  noise.start(t);
  noise.stop(t + 0.11);
}

function playHat(time = null) {
  ensureAudio();
  const t = time ?? audioCtx.currentTime;
  const bufferSize = Math.floor(audioCtx.sampleRate * 0.05);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = "highpass";
  filter.frequency.setValueAtTime(7000, t);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.18, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  noise.start(t);
  noise.stop(t + 0.04);
}

function playDrumSubstep(step) {
  playHat();
  if (step === 0 || step === 4 || step === 5) playKick();
  if (step === 2 || step === 6) playSnare();
}

// ====================== UTILITAIRES ======================
function beatInterval() { return 60000 / state.bpm; }
function sampleOne(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ====================== RIMES ======================
function refillBag(g) {
  state.rimes.groupBags[g].push(...shuffle(RHYME_GROUPS[g].words));
}

function pickDistinctWords(g, n) {
  const chosen = [], seen = new Set();
  while (chosen.length < n) {
    if (!state.rimes.groupBags[g].length) refillBag(g);
    const w = state.rimes.groupBags[g].pop();
    if (seen.has(w)) continue;
    chosen.push(w);
    seen.add(w);
  }
  return chosen;
}

function chooseRhymeGroup() {
  const recent = new Set(state.rimes.recentGroups.slice(-12));
  let candidates = RHYME_GROUPS.map((_, i) => i).filter(i => !recent.has(i));
  if (!candidates.length) candidates = RHYME_GROUPS.map((_, i) => i);

  const weights = candidates.map(i => {
    const base = 1 / (1 + state.rimes.groupUsage[i]);
    if (RHYME_GROUPS[i].syllables === 2) return base * 1.8;
    if (RHYME_GROUPS[i].syllables === 1) return base * 0.45;
    return base * 0.9;
  });

  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let k = 0; k < candidates.length; k++) {
    r -= weights[k];
    if (r <= 0) {
      const g = candidates[k];
      state.rimes.groupUsage[g]++;
      state.rimes.recentGroups.push(g);
      return g;
    }
  }
  return candidates[candidates.length - 1];
}

function helperWord(g, forbidden, rowIdx) {
  const forbiddenSet = new Set([forbidden]);
  if (rowIdx > 0) {
    forbiddenSet.add(state.rimes.rows[rowIdx - 1].word4);
    if (state.rimes.rows[rowIdx - 1].word2) forbiddenSet.add(state.rimes.rows[rowIdx - 1].word2);
  }
  let available = RHYME_GROUPS[g].words.filter(w => !forbiddenSet.has(w));
  if (!available.length) available = RHYME_GROUPS[g].words.filter(w => w !== forbidden);
  return available.length ? sampleOne(available) : null;
}

function generateRhymeBlock() {
  const blockLen = Math.random() < 0.30 ? 4 : 2;
  const g = chooseRhymeGroup();
  const color = PALETTE[g % PALETTE.length];
  const words4 = pickDistinctWords(g, blockLen);

  for (const w4 of words4) {
    const rowIdx = state.rimes.rows.length;
    const w2 = Math.random() < 0.25 ? helperWord(g, w4, rowIdx) : null;
    state.rimes.rows.push({ word2: w2, word4: w4, group: g, color, key: RHYME_GROUPS[g].key });
  }
}

function ensureRhymeRows(n) {
  while (state.rimes.rows.length < n) generateRhymeBlock();
}

function initRimes() {
  state.rimes.rows = [];
  state.rimes.rowIdx = 0;
  state.rimes.colIdx = 0;
  state.rimes.groupBags = RHYME_GROUPS.map(() => []);
  state.rimes.groupUsage = RHYME_GROUPS.map(() => 0);
  state.rimes.recentGroups = [];
  ensureRhymeRows(24);
}

function advanceRimes() {
  state.rimes.colIdx++;
  if (state.rimes.colIdx >= COLS) {
    state.rimes.colIdx = 0;
    state.rimes.rowIdx++;
    ensureRhymeRows(state.rimes.rowIdx + 24);
  }
}

// ====================== DÉCLENCHEURS ======================
function pickTheme() {
  const recent = state.declencheurs.recentThemes.slice(-10);
  let pool = THEMES.filter(t => !recent.includes(t));
  if (!pool.length) pool = [...THEMES];
  return sampleOne(pool);
}

function pickTriggers(n = 4) {
  const recent = state.declencheurs.recentTriggers.slice(-12);
  let pool = TRIGGERS.filter(t => !recent.includes(t));
  if (pool.length < n) pool = [...TRIGGERS];
  return shuffle(pool).slice(0, n);
}

function initDeclencheursPack() {
  const theme = pickTheme();
  const triggers = pickTriggers(4);
  state.declencheurs.theme = theme;
  state.declencheurs.triggers = triggers;
  state.declencheurs.cycleBeat = 0;
  state.declencheurs.recentThemes.push(theme);
  state.declencheurs.recentTriggers.push(...triggers);
}

function initDeclencheurs() {
  state.declencheurs.recentThemes = [];
  state.declencheurs.recentTriggers = [];
  initDeclencheursPack();
}

function advanceDeclencheurs() {
  state.declencheurs.cycleBeat++;
  if (state.declencheurs.cycleBeat >= TRIGGER_BLOCK_BEATS) {
    initDeclencheursPack();
  }
}

function activeTriggerIndex() {
  return Math.min(3, Math.floor(state.declencheurs.cycleBeat / 8));
}

function currentMeasureInBlock() {
  return Math.floor(state.declencheurs.cycleBeat / 4) + 1;
}

// ====================== RENDER ======================
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function buildRhymeRows() {
  const gridEl = document.getElementById("grid");
  gridEl.innerHTML = "";
  const startRow = Math.max(0, state.rimes.rowIdx - 2);
  const endRow = startRow + VISIBLE_ROWS;
  ensureRhymeRows(endRow + 4);

  for (let vr = 0; vr < VISIBLE_ROWS; vr++) {
    const realR = startRow + vr;
    if (realR >= state.rimes.rows.length) break;
    const row = state.rimes.rows[realR];
    const rowDiv = document.createElement("div");
    rowDiv.className = "grid-row";

    const numEl = document.createElement("div");
    numEl.className = "row-num";
    numEl.textContent = realR + 1;
    rowDiv.appendChild(numEl);

    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement("div");
      cell.className = "cell";

      if (c === 1 && row.word2) {
        cell.classList.add("has-word");
        cell.textContent = row.word2;
        cell.style.background = hexToRgba(row.color, 0.22);
        cell.style.borderColor = hexToRgba(row.color, 0.55);
      } else if (c === 3) {
        cell.classList.add("has-word");
        cell.textContent = row.word4;
        cell.style.background = hexToRgba(row.color, 0.45);
        cell.style.borderColor = row.color;
      }

      if (realR === state.rimes.rowIdx && c === state.rimes.colIdx) {
        cell.classList.add("is-cursor");
      }
      rowDiv.appendChild(cell);
    }
    gridEl.appendChild(rowDiv);
  }
}

function buildTriggerCards() {
  const list = document.getElementById("trigger-list");
  list.innerHTML = "";
  const activeIdx = activeTriggerIndex();

  state.declencheurs.triggers.forEach((txt, i) => {
    const card = document.createElement("div");
    card.className = "trigger-card";
    if (i === activeIdx) card.classList.add("active");

    const idx = document.createElement("div");
    idx.className = "trigger-index";
    idx.textContent = i + 1;

    const wrap = document.createElement("div");
    wrap.style.flex = "1";

    const text = document.createElement("div");
    text.className = "trigger-text";
    text.textContent = txt;

    const hint = document.createElement("div");
    hint.className = "trigger-hint";
    hint.textContent = i === activeIdx ? "déclencheur actif" : "à exploiter ensuite";

    wrap.appendChild(text);
    wrap.appendChild(hint);
    card.appendChild(idx);
    card.appendChild(wrap);
    list.appendChild(card);
  });

  document.getElementById("theme-value").textContent = state.declencheurs.theme || "—";
}

function updateHUD() {
  document.getElementById("hud-mode").textContent = state.selectedMode === "rimes" ? "RIMES" : "DÉCL.";
  document.getElementById("hud-bpm").textContent = state.bpm;

  if (state.selectedMode === "rimes") {
    const cur = state.rimes.rows[state.rimes.rowIdx];
    document.getElementById("hud-a").innerHTML = `L.<span id="hud-a-value">${state.rimes.rowIdx + 1}</span>`;
    document.getElementById("hud-b").innerHTML = `<span id="hud-b-value">${state.rimes.colIdx + 1}</span>/4`;
    document.getElementById("hud-main").textContent = cur ? cur.word4 : "—";
  } else {
    document.getElementById("hud-a").innerHTML = `MES.<span id="hud-a-value">${currentMeasureInBlock()}</span>/8`;
    document.getElementById("hud-b").innerHTML = `<span id="hud-b-value">${(state.declencheurs.cycleBeat % 4) + 1}</span>/4`;
    document.getElementById("hud-main").textContent = state.declencheurs.theme || "—";
  }
}

function render() {
  document.getElementById("rimes-view").classList.toggle("hidden", state.selectedMode !== "rimes");
  document.getElementById("declencheurs-view").classList.toggle("hidden", state.selectedMode !== "declencheurs");

  if (state.selectedMode === "rimes") buildRhymeRows();
  else buildTriggerCards();

  updateHUD();
}

// ====================== CONTROLES ======================
function setPlayButton(isRunning) {
  const btn = document.getElementById("btn-pause");
  btn.querySelector(".icon").textContent = isRunning ? "⏸" : "▶";
  btn.querySelector("span:last-child").textContent = isRunning ? "PAUSE" : "PLAY";
  btn.classList.toggle("pause-active", !isRunning);
}

function startSelectedMode() {
  state.activeScreen = "game";
  state.running = false;

  const now = performance.now();
  state.lastBeatTime = now;
  state.lastSubBeatTime = now;
  drumStep = 0;

  if (state.selectedMode === "rimes") initRimes();
  else initDeclencheurs();

  document.getElementById("splash").style.display = "none";
  document.getElementById("game").style.display = "flex";
  setPlayButton(false);
  render();

  if (!state.animFrameId) state.animFrameId = requestAnimationFrame(loop);
}

function goHome() {
  state.activeScreen = "splash";
  state.running = false;
  document.getElementById("game").style.display = "none";
  document.getElementById("splash").style.display = "flex";
  setPlayButton(false);
}

function togglePause() {
  if (state.activeScreen !== "game") return;

  state.running = !state.running;

  if (state.running) {
    ensureAudio();
    const now = performance.now();
    state.lastBeatTime = now;
    state.lastSubBeatTime = now;
    drumStep = 0;
    playDrumSubstep(drumStep);
    drumStep = (drumStep + 1) % 8;
  }

  setPlayButton(state.running);
}

function changeBpm(delta) {
  state.bpm = Math.max(30, Math.min(240, state.bpm + delta));
  document.getElementById("bpm-display").textContent = state.bpm;
  updateHUD();
}

function resetCurrentMode() {
  if (state.selectedMode === "rimes") initRimes();
  else initDeclencheurs();

  state.running = false;
  const now = performance.now();
  state.lastBeatTime = now;
  state.lastSubBeatTime = now;
  drumStep = 0;

  setPlayButton(false);
  render();
}

// ====================== LOOP PRINCIPAL ======================
function loop(now) {
  if (state.activeScreen === "game" && state.running) {
    const beatMs = beatInterval();
    const subBeatMs = beatMs / 2;

    // Gestion des croches (batterie)
    while (now - state.lastSubBeatTime >= subBeatMs) {
      state.lastSubBeatTime += subBeatMs;
      playDrumSubstep(drumStep);
      drumStep = (drumStep + 1) % 8;
    }

    // Gestion des temps (avancement grille / déclencheurs)
    while (now - state.lastBeatTime >= beatMs) {
      state.lastBeatTime += beatMs;

      if (state.selectedMode === "rimes") {
        advanceRimes();
      } else {
        advanceDeclencheurs();
      }
    }
  }

  if (state.activeScreen === "game") render();
  state.animFrameId = requestAnimationFrame(loop);
}

// ====================== ÉVÉNEMENTS ======================
document.getElementById("mode-rimes-card").addEventListener("click", () => {
  state.selectedMode = "rimes";
  document.getElementById("mode-rimes-card").classList.add("active");
  document.getElementById("mode-declencheurs-card").classList.remove("active");
});

document.getElementById("mode-declencheurs-card").addEventListener("click", () => {
  state.selectedMode = "declencheurs";
  document.getElementById("mode-rimes-card").classList.remove("active");
  document.getElementById("mode-declencheurs-card").classList.add("active");
});

document.getElementById("bpm-up").addEventListener("click", () => changeBpm(5));
document.getElementById("bpm-down").addEventListener("click", () => changeBpm(-5));
document.getElementById("start-btn").addEventListener("click", startSelectedMode);
document.getElementById("btn-pause").addEventListener("click", togglePause);
document.getElementById("btn-bpm-down").addEventListener("click", () => changeBpm(-5));
document.getElementById("btn-bpm-up").addEventListener("click", () => changeBpm(5));
document.getElementById("btn-reset").addEventListener("click", resetCurrentMode);
document.getElementById("btn-home").addEventListener("click", goHome);

document.addEventListener("keydown", (e) => {
  if (state.activeScreen !== "game") return;
  if (e.key === " ") { e.preventDefault(); togglePause(); }
  if (e.key === "ArrowUp") changeBpm(5);
  if (e.key === "ArrowDown") changeBpm(-5);
  if (e.key.toLowerCase() === "r") resetCurrentMode();
  if (e.key === "Escape") goHome();
});

// Initialisation
document.getElementById("bpm-display").textContent = state.bpm;
state.selectedMode = "rimes";
setPlayButton(false);
</script>
</body>
</html>
